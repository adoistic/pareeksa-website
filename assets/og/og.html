  @font-face{font-family:"Geist Mono";src:url(../../fonts/GeistMono-variable.woff2) format("woff2");font-weight:100 900;font-display:block}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}

    width:1200px;height:630px;background:#1D4ED8;color:#fff;overflow:hidden;position:relative;

  .lock .word{font-weight:600;font-size:42px;letter-spacing:-.02em}
  .headline{font-weight:600;font-size:98px;line-height:.98;letter-spacing:-.035em;max-width:920px}
  .meta{margin-top:26px;font-family:"Geist Mono",monospace;font-size:20px;letter-spacing:.005em;color:rgba(255,255,255,.74);font-weight:440;white-space:nowrap}
  .foot{display:flex;justify-content:space-between;align-items:flex-end}
  .foot span{font-family:"Geist Mono",monospace;font-size:22px;font-weight:450}
  .foot .tag{color:rgba(255,255,255,.72)}
